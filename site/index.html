<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Interview English</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1>Interview English</h1>
    <div class="hdr-right">
      <button class="hdr-icon" onclick="toggleSearch()" id="searchToggle" title="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="hdr-icon" onclick="doLogout()" title="Logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div class="search-bar" id="searchBar" style="display:none">
    <svg viewBox="0 0 24 24" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" placeholder="Search patterns, frameworks..." id="searchInput" oninput="doSearch(this.value)">
  </div>

  <div class="app-content" id="appContent">
    <div class="tab on" id="tab-home">
      <div id="heroArea"></div>
      <div id="statsArea"></div>
      <div id="playlistArea"></div>
    </div>

    <div class="tab" id="tab-patterns">
      <div class="cat-chips" id="catChips"></div>
      <div id="patternsList"></div>
    </div>

    <div class="tab" id="tab-frameworks">
      <div id="frameworksList"></div>
    </div>

    <div class="tab" id="tab-practice">
      <div id="practiceList"></div>
    </div>

    <div class="tab" id="tab-playlists">
      <div id="playlistsTabList"></div>
    </div>
  </div>

  <div class="sticky-player" id="stickyPlayer">
    <button class="sp-play-btn" id="spPlayBtn" onclick="togglePlay(event)">
      <svg viewBox="0 0 24 24" id="spPlayIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <div class="sp-center" onclick="openPlayer()">
      <div class="sp-title" id="spTitle">-</div>
      <div class="sp-playlist-label" id="spPlaylistLabel"></div>
      <div class="sp-progress" onclick="seekFromMiniEvent(event); event.stopPropagation();">
        <div class="sp-progress-fill" id="spProgressFill"></div>
      </div>
    </div>
    <button class="sp-next-btn" onclick="playNext(event)">
      <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
  </div>
  <audio preload="metadata" id="spAudio"></audio>

  <div class="resume-hint" id="resumeHint" style="display:none" onclick="resumePlay()">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <span>Tap to continue playing</span>
  </div>

  <div class="full-player" id="fullPlayer">
    <div class="fp-top-bar">
      <button class="fp-back-btn" onclick="closePlayer()" title="Back to list">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Back</span>
      </button>
      <div class="fp-drag-handle" id="fpDragHandle">
        <div class="fp-chevron"></div>
      </div>
      <div style="width:60px"></div>
    </div>
    <div class="fp-artwork" id="fpArtwork">
      <div class="fp-ep-num" id="fpEpNum">#1</div>
      <div class="fp-ep-pattern" id="fpEpPattern"></div>
    </div>
    <div class="fp-title" id="fpTitle">-</div>
    <div class="fp-sub" id="fpSub">-</div>
    <div class="fp-seek-row">
      <span class="fp-time" id="fpTimeCurrent">0:00</span>
      <input type="range" class="fp-seek" id="fpSeek" min="0" max="1000" value="0" oninput="seekFromSlider(this.value)">
      <span class="fp-time" id="fpTimeDuration">0:00</span>
    </div>
    <div class="fp-controls">
      <button class="fp-ctrl" onclick="playPrev()" title="Previous">
        <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
      </button>
      <button class="fp-ctrl fp-ctrl-sm" onclick="seekRel(-15)" title="Rewind 15s">
        <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/><text x="9" y="16" font-size="7" fill="currentColor" font-weight="700">15</text></svg>
      </button>
      <button class="fp-ctrl fp-ctrl-play" id="fpPlayBtn" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" id="fpPlayIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="fp-ctrl fp-ctrl-sm" onclick="seekRel(15)" title="Forward 15s">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/><text x="9" y="16" font-size="7" fill="currentColor" font-weight="700">15</text></svg>
      </button>
      <button class="fp-ctrl" onclick="playNext()" title="Next">
        <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
    <div class="fp-loop-row">
      <button class="fp-loop-btn" id="fpLoopBtn" onclick="cycleLoopMode()">
        <svg viewBox="0 0 24 24" class="loop-icon"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span id="fpLoopLabel" class="fp-loop-label">Loop off</span>
      </button>
    </div>
    <div class="fp-playlist-toggle" onclick="togglePlaylist()">
      <span>Playlist</span>
      <span class="fp-playlist-count" id="fpPlaylistCount">0 episodes</span>
      <svg viewBox="0 0 24 24" id="fpPlaylistChevron"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="fp-playlist" id="fpPlaylist">
      <div class="fp-playlist-list" id="fpPlaylistList"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item on" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-tab="patterns" onclick="switchTab('patterns')">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Patterns</span>
    </button>
    <button class="nav-item" data-tab="frameworks" onclick="switchTab('frameworks')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Frameworks</span>
    </button>
    <button class="nav-item" data-tab="practice" onclick="switchTab('practice')">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Practice</span>
    </button>
    <button class="nav-item" data-tab="playlists" onclick="switchTab('playlists')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Playlists</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
